# Render blueprint — deploy with "New +" -> "Blueprint" pointing at this repo.
# Free tier note: the service sleeps after ~15 min idle; the first visitor
# afterwards waits through a cold start (~1 min). Fine for a portfolio demo.
services:
  - type: web
    name: golazo
    runtime: python
    plan: free
    # Install from the LOCKFILE (full pip freeze of a verified-working env):
    # every transitive dep is pinned, so the resolver has no decisions to
    # make — repeated ResolutionImpossible failures came from re-resolving
    # the crewai/chromadb graph fresh on every build.
    buildCommand: pip install --upgrade pip && pip install -r requirements.lock
    startCommand: uvicorn briefing_engine.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set this in the Render dashboard, never in git
      - key: CACHE_REDIS_URL
        sync: false          # free Upstash Redis URL — durable cache tier.
                             # (NOT "REDIS_URL": agent-stack libs auto-grab
                             # that name and break with TLS errors.)
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: PYTHON_VERSION
        value: 3.12.6
